<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Quizlet Clone - 学习卡片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Quizlet Clone</h1>
            <nav>
                <button onclick="showView('manage')">管理卡片</button>
                <button onclick="showView('study')">学习模式</button>
            </nav>
        </header>

        <div id="manage-view" class="view">
            <h2>管理学习卡片</h2>
            <div class="card-form">
                <input type="text" id="question-input" placeholder="问题">
                <input type="text" id="answer-input" placeholder="答案">
                
                <div class="category-group">
                    <select id="category-select" class="form-control">
                        <option value="">请选择分类（必选）</option>
                    </select>
                    <button type="button" class="add-category-btn" onclick="openCategoryModal()">+ 新增分类</button>
                    <button type="button" class="delete-category-btn" onclick="deleteSelectedCategory()" style="background: #e53e3e; color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer;">- 删除选定分类</button>
                </div>
                
                <div class="form-actions-row">
                    <button onclick="createFlashcard()">添加单张卡片</button>
                    <button type="button" class="batch-btn" onclick="openBatchModal()">⚡ 批量导入</button>
                </div>
            </div>
            
            <div class="toolbar" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="filter-category-select" class="form-control" onchange="filterCards()" style="max-width: 200px;">
                    <option value="all">📁 查看所有分类</option>
                </select>
                <input type="text" id="search-input" placeholder="🔍 搜索问题、答案..." onkeyup="filterCards()" style="flex: 1;">
            </div>

            <div id="flashcards-list" class="cards-grid"></div>

            <div id="category-modal" class="modal" style="display: none;">
                <h3>新增分类</h3>
                <input type="text" id="new-category-input" placeholder="输入新分类名称">
                <div class="modal-actions">
                    <button onclick="confirmCategory()">确认</button>
                    <button onclick="closeCategoryModal()">取消</button>
                </div>
            </div>

            <div id="batch-modal" class="modal" style="display: none;">
                <h3>⚡ 批量导入卡片</h3>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">
                    请直接从表格（如 Excel、钉钉表格）复制两列内容并粘贴在下方，或者手动输入，用竖线 "|" 分隔问题和答案：<br>
                    <code>苹果 | Apple</code><br>
                    <code>香蕉 | Banana</code>
                </p>
                
                <select id="batch-category-select" class="form-control" style="margin-bottom: 15px;">
                    <option value="">请选择要导入到哪个分类...</option>
                </select>

                <textarea id="batch-input" rows="8" placeholder="在此粘贴你的卡片数据..."></textarea>
                
                <div class="modal-actions">
                    <button onclick="confirmBatchImport()">开始导入</button>
                    <button onclick="closeBatchModal()">取消</button>
                </div>
            </div>
        </div>

        <div id="edit-view" class="view hidden">
            <h2>编辑闪卡</h2>
            <div class="form-group">
                <label>问题：</label>
                <input type="text" id="edit-question-input">
            </div>
            <div class="form-group">
                <label>答案：</label>
                <input type="text" id="edit-answer-input">
            </div>
            <div class="form-group">
                <label>分类：</label>
                <select id="edit-category-select" class="form-control">
                    <option value="">请选择分类（必选）</option>
                </select>
            </div>
            <div class="form-actions">
                <button onclick="updateFlashcard()">更新闪卡</button>
                <button onclick="showView('manage')">取消</button>
            </div>
        </div>

        <div id="study-view" class="view hidden">
            <h2>学习模式</h2>
            
            <div id="study-setup" class="study-setup">
                <h3>你想复习哪个分类？</h3>
                <select id="study-category-select" class="form-control" style="margin-bottom: 10px;">
                    <option value="all">📚 全部卡片 (混合复习)</option>
                </select>
                
                <div style="margin-bottom: 20px;">
                    <label for="study-limit" style="font-size: 0.9rem; color: #4a5568;">本次最多学习：</label>
                    <input type="number" id="study-limit" class="form-control" value="20" min="1" max="500" style="width: 100px; display: inline-block;">
                    <span style="font-size: 0.9rem; color: #4a5568;"> 张</span>
                </div>

                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <button onclick="startReciteMode()" class="start-btn" style="background: #48bb78;">📖 开始背诵 (翻卡)</button>
                    <button onclick="startSpellMode()" class="start-btn" style="background: #4299e1;">✏️ 开始默写 (拼写)</button>
                </div>
            </div>

            <div id="study-card-area" class="hidden">
                <div class="study-progress">
                    <span id="study-progress-text">1 / 10</span>
                    <div class="progress-bar-container"><div id="progress-bar-fill"></div></div>
                </div>
                <div id="study-card" class="study-card" onclick="flipCard()">
                    <div id="card-inner" class="card-inner">
                        <div class="card-front">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <h3 id="study-question"></h3>
                                <button class="speak-btn" onclick="speakWord(document.getElementById('study-question').innerText, event)">🔊</button>
                            </div>
                            <p class="flip-hint">👆 点击空白处翻看答案</p>
                        </div>
                        <div class="card-back">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <h3 id="study-answer"></h3>
                                <button class="speak-btn" onclick="speakWord(document.getElementById('study-answer').innerText, event)">🔊</button>
                            </div>
                            <p class="flip-hint">👆 点击空白处翻回问题</p>
                        </div>
                    </div>
                </div>
                <div class="study-controls">
                    <button id="study-prev-btn" onclick="prevStudyCard()" style="background: #a0aec0; display: none;">⬅️ 上一张</button>
                    <button onclick="markAsKnown()">已掌握 (下一个)</button>
                    <button onclick="markAsReview()">需要复习 (重背)</button>
                </div>
            </div>

            <div id="spell-card-area" class="hidden">
                <div class="study-progress">
                    <span id="spell-progress-text"></span>
                </div>
                <div class="spell-card">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <h3 id="spell-question" style="font-size: 1.8rem;"></h3>
                        <button class="speak-btn" onclick="speakWord(document.getElementById('spell-question').innerText, event)">🔊</button>
                    </div>
                    <input type="text" id="spell-input" placeholder="请在此输入对应的答案..." onkeypress="handleSpellEnter(event)" autocomplete="off">
                    <br>
                    <button onclick="checkSpelling()" class="check-btn">提交检验 (Enter)</button>
                    <div id="spell-feedback" class="feedback-text"></div>
                </div>
                <div class="study-controls hidden" id="spell-next-control" style="margin-top: 20px;">
                    <button id="spell-prev-btn" onclick="prevSpellCard()" style="background: #a0aec0; margin-right: 15px; display: none;">⬅️ 上一张</button>
                    <button onclick="nextSpellCard()">下一张 ➡️</button>
                </div>
            </div>
        </div>

        <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
