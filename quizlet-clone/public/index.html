<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizlet Clone - 学习卡片应用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Quizlet Clone</h1>
            <nav>
                <button onclick="showView('manage')">管理卡片</button>
                <button onclick="showView('study')">学习模式</button>
            </nav>
        </header>

        <!-- 管理卡片视图 -->
        <div id="manage-view" class="view">
            <h2>管理学习卡片</h2>
            <div class="card-form">
                <input type="text" id="question-input" placeholder="问题">
                <input type="text" id="answer-input" placeholder="答案">
                <input type="text" id="category-input" placeholder="分类（可选）">
                <button onclick="createFlashcard()">添加卡片</button>
            </div>
            <div id="flashcards-list" class="cards-grid"></div>
        </div>

        <!-- 编辑视图 -->
        <div id="edit-view" class="view hidden">
            <h2>编辑闪卡</h2>
            
          
            <div class="form-group">
                <label for="edit-question-input">问题：</label>
                <input type="text" id="edit-question-input" placeholder="输入问题">
            </div>
            
            <div class="form-group">
                <label for="edit-answer-input">答案：</label>
                <input type="text" id="edit-answer-input" placeholder="输入答案">
            </div>
            
            <div class="form-group">
                <label for="edit-category-input">分类：</label>
                <input type="text" id="edit-category-input" placeholder="输入分类（可选）">
            </div>
            
            <div class="form-actions">
                <button onclick="updateFlashcard()">更新闪卡</button>
                <button onclick="showView('manage')">取消</button>
            </div>
        </div>

        <!-- 学习模式视图 -->
        <div id="study-view" class="view hidden">
            <h2>学习模式</h2>
            <div id="study-card" class="study-card">
                <div class="card-front">
                    <h3 id="study-question"></h3>
                    <button onclick="flipCard()">显示答案</button>
                </div>
                <div class="card-back hidden">
                    <h3 id="study-answer"></h3>
                    <button onclick="nextCard()">下一个</button>
                </div>
            </div>
            <div class="study-controls">
                <button onclick="markAsKnown()">已掌握</button>
                <button onclick="markAsReview()">需要复习</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
